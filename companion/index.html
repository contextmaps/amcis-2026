<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Companion · Teaching Inside the Thread</title>
  <meta name="description" content="The hands-on artifact for the AMCIS 2026 workshop on an AI-Centered Pedagogy.">
  <link rel="stylesheet" href="../assets/shared.css">
  <style>
    /* ---------- Companion layout ---------- */
    .companion-wrap {
      padding: var(--space-8) 0 var(--space-16);
      max-width: 1280px;
    }
    .screen {
      display: none;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
      animation: screenFade 0.18s ease;
    }
    .screen.is-active { display: block; }
    @keyframes screenFade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tri-step-prompt {
      font-size: var(--fs-2xl);
      font-weight: 600;
      margin: 0 0 var(--space-2);
      color: var(--fg);
      line-height: 1.3;
    }
    .tri-step-sub {
      font-size: var(--fs-base);
      color: var(--fg-muted);
      margin: 0 0 var(--space-6);
    }

    /* ---------- Step 1: 4 x 2 grid of group panels ----------
       Lifted pattern: each category becomes a .tri-group card with
       a label header and a single radio "card" inside. The 8th cell
       is the .tri-group-other peer panel with always-visible textarea. */
    .tri-groups {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      align-items: stretch;
    }
    @media (min-width: 720px) {
      .tri-groups { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1100px) {
      .tri-groups { grid-template-columns: repeat(4, 1fr); }
    }

    .tri-group {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    /* Step 1: card itself is the selection target (click anywhere). */
    .tri-group--clickable {
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .tri-group--clickable:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
    }
    .tri-group--clickable.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      border-width: 2px;
      padding: calc(var(--space-4) - 1px);
    }
    .tri-group--clickable.selected .tri-group-label {
      color: var(--accent-deep);
    }
    .tri-group--clickable:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    /* Amber-tan tint for the Other peer panel — lifted token spirit from
       Pamplin's --c-r-bg / --c-r-border / --c-r-id. */
    .tri-group-other {
      background: #fff8f0;
      border-color: #d0a040;
    }
    .tri-group-other.selected {
      background: #fff0d8;
      border-color: #b88420;
      border-width: 2px;
      padding: calc(var(--space-4) - 1px);
    }
    .tri-group-label {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--accent);
      margin: 0 0 var(--space-1);
    }
    .tri-group-other .tri-group-label {
      color: #6b3e00;
    }
    .tri-group-desc {
      font-size: var(--fs-sm);
      color: var(--fg-muted);
      margin: 0;
      line-height: 1.5;
    }
    .tri-group-boundary {
      font-size: var(--fs-xs);
      color: var(--fg-muted);
      font-style: italic;
      margin: 0;
      line-height: 1.4;
    }

    .tri-choice {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      width: 100%;
      text-align: left;
      cursor: pointer;
      padding: var(--space-3);
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      font-size: var(--fs-sm);
      line-height: 1.4;
      color: var(--fg);
      transition: background 0.12s ease, border-color 0.12s ease;
      margin-top: auto;
    }
    .tri-choice:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .tri-choice.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .tri-choice-radio {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      margin-top: 2px;
      position: relative;
      background: #ffffff;
    }
    .tri-choice.selected .tri-choice-radio {
      border-color: var(--accent);
    }
    .tri-choice.selected .tri-choice-radio::after {
      content: "";
      position: absolute;
      top: 2px; left: 2px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
    .tri-choice-check {
      flex: 0 0 auto;
      width: 18px; height: 18px;
      border-radius: 3px;
      border: 2px solid var(--border-strong);
      margin-top: 2px;
      position: relative;
      background: #ffffff;
    }
    .tri-choice.selected .tri-choice-check {
      border-color: var(--accent);
      background: var(--accent);
    }
    .tri-choice.selected .tri-choice-check::after {
      content: "";
      position: absolute;
      top: 0px; left: 4px;
      width: 6px; height: 11px;
      border: solid #ffffff;
      border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg);
    }
    .tri-choice-text { flex: 1; }

    /* ---------- Step 2 and Step 4 vertical list + Other reveal ---------- */
    .tri-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .tri-other-input-wrap {
      margin-top: var(--space-3);
    }
    .tri-other-input-wrap.hidden { display: none; }

    /* The .plib-textarea and .plib-counter primitives live in shared.css
       (defined in HANDOFF_01). They cover the Pamplin behavior here. */

    /* ---------- Step 3 form ---------- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-5);
    }
    @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .form-field--full { grid-column: 1 / -1; }
    .form-field label {
      font-weight: 500;
      font-size: var(--fs-sm);
      color: var(--fg);
    }
    .form-field input[type="text"],
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font: inherit;
      color: var(--fg);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
    }
    .form-field input[type="text"]:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 0, 49, 0.15);
    }
    .form-field textarea { min-height: 90px; resize: vertical; }
    .form-field .field-hint {
      font-size: var(--fs-xs);
      color: var(--fg-muted);
    }

    /* ---------- Review ---------- */
    .review-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }
    @media (min-width: 1024px) {
      .review-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        align-items: stretch;
      }
    }
    .review-col-prompt {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      height: 100%;
    }
    .review-col-prompt .review-prompt-preview {
      flex: 1 1 auto;
    }
    .review-rows {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .review-row {
      display: grid;
      grid-template-columns: 12rem 1fr auto;
      gap: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      align-items: start;
    }
    @media (max-width: 720px) {
      .review-row { grid-template-columns: 1fr; }
    }
    .review-row__label {
      font-size: var(--fs-sm);
      color: var(--fg-muted);
      font-weight: 500;
    }
    .review-row__value {
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .review-row__value ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    .review-prompt-label {
      font-weight: 500;
      font-size: var(--fs-sm);
      margin-bottom: var(--space-2);
    }
    .review-prompt-preview {
      width: 100%;
      min-height: 200px;
      padding: var(--space-3);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      line-height: 1.5;
      color: var(--fg);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      resize: vertical;
    }

    /* ---------- Bridge ---------- */
    .bridge-callout {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-5);
    }
    .agent-link-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      background: #ffffff;
      flex-wrap: wrap;
    }
    .agent-link-box a {
      word-break: break-all;
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
    }
    .read-only-prompt {
      width: 100%;
      min-height: 200px;
      padding: var(--space-4);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      line-height: 1.5;
      color: var(--fg);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      resize: vertical;
    }
    .output-schema-line {
      margin: var(--space-4) 0 0;
      padding: var(--space-2) 0;
      font-size: var(--fs-sm);
      color: var(--fg-muted);
      line-height: 1.5;
    }
    .output-schema-line__label {
      font-weight: 600;
      color: var(--fg);
      margin-right: 0.35rem;
    }

    /* ---------- Reflection sub-blocks ---------- */
    .reflect-stack {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }
    .reflect-block {
      padding: var(--space-5);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      position: relative;
    }
    .reflect-block::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }
    .reflect-block--r::before { background: var(--block-r); }
    .reflect-block__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }
    .reflect-block__prompt {
      font-weight: 500;
      color: var(--fg);
    }

    .reflect-saved {
      padding: var(--space-5);
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid var(--success);
      border-radius: var(--radius-md);
      margin-top: var(--space-6);
    }
    .reflect-saved__actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-4);
      flex-wrap: wrap;
    }
    .name-field {
      margin-top: var(--space-6);
      max-width: 24rem;
    }

    /* Screen actions row */
    .screen-actions {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-8);
      flex-wrap: wrap;
    }
    .screen-actions__right {
      display: flex;
      gap: var(--space-3);
      margin-left: auto;
    }

    .screen .block-label { margin-bottom: var(--space-2); }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header__title"><a href="../">Teaching Inside the Thread</a></div>
    <a class="page-header__home" href="../">Home</a>
  </header>

  <main class="container container--prose companion-wrap" id="companionMain">
    <h1 class="visually-hidden">The Companion</h1>

    <section class="screen block-accent block-accent--r0" id="screen-step1">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <h2 class="tri-step-prompt" id="step1-prompt"></h2>
      <p class="tri-step-sub" id="step1-sub"></p>
      <div class="tri-groups" id="step1-groups"></div>
      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step1-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--r0" id="screen-step2">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <h2 class="tri-step-prompt" id="step2-prompt"></h2>
      <p class="tri-step-sub" id="step2-sub"></p>
      <div id="step2-body"></div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step1" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step2-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--r0" id="screen-step3">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <h2 class="tri-step-prompt" id="step3-prompt"></h2>
      <p class="tri-step-sub" id="step3-sub"></p>
      <div class="form-grid" id="step3-form"></div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step2" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step3-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--r0" id="screen-step4">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <h2 class="tri-step-prompt" id="step4-prompt"></h2>
      <p class="tri-step-sub" id="step4-sub"></p>
      <div id="step4-body"></div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step3" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step4-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--r0" id="screen-review">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <h2 class="tri-step-prompt" id="review-prompt"></h2>
      <p class="tri-step-sub" id="review-sub"></p>
      <div class="review-grid">
        <div class="review-rows" id="review-rows"></div>
        <div class="review-col-prompt">
          <div class="review-prompt-label">Prompt to be copied</div>
          <textarea class="review-prompt-preview" id="prompt-preview" readonly aria-label="Assembled prompt preview"></textarea>
        </div>
      </div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step4" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="review-commit" type="button"></button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--s" id="screen-bridge">
      <span class="block-label block-label--s"><span class="block-label__dot"></span>Prompt block</span>
      <h2 class="tri-step-prompt" id="bridge-h"></h2>
      <div class="bridge-callout" id="bridge-confirmation"></div>
      <div class="agent-link-box">
        <a href="#" id="bridge-agent-link" target="_blank" rel="noopener"></a>
        <button class="btn btn-secondary plib-copy-btn" id="bridge-copy-again" type="button" data-copied-label="Copied"></button>
      </div>
      <div class="review-prompt-label" id="bridge-prompt-label"></div>
      <textarea class="read-only-prompt" id="bridge-prompt" readonly aria-label="Assembled prompt"></textarea>

      <p class="output-schema-line" id="output-schema-line">
        <span class="output-schema-line__label">What the agent will produce:</span>
        <span id="output-schema-line__body"></span>
      </p>

      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="bridge-return" type="button"></button>
        </div>
      </div>
    </section>

    <section class="screen block-accent block-accent--r" id="screen-reflection">
      <span class="block-label block-label--r"><span class="block-label__dot"></span>Reflection block</span>
      <h2 class="tri-step-prompt" id="reflect-h"></h2>
      <p class="tri-step-sub" id="reflect-sub"></p>

      <div class="reflect-stack" id="reflect-stack">
        <div class="reflect-block reflect-block--r">
          <div class="reflect-block__header">
            <span class="reflect-block__prompt" id="reflect-r-prompt"></span>
            <span class="block-label block-label--r"><span class="block-label__dot"></span>R</span>
          </div>
          <textarea class="plib-textarea" id="reflect-r-text" aria-label="Reflection text"></textarea>
          <div class="plib-counter" id="reflect-r-counter">0 words</div>
        </div>
      </div>

      <div class="name-field">
        <label for="reflect-name" id="reflect-name-label">Your name (optional)</label>
        <input type="text" id="reflect-name" placeholder="">
      </div>

      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="reflect-save" type="button"></button>
        </div>
      </div>

      <div class="reflect-saved" id="reflect-saved" hidden>
        <strong id="reflect-saved-msg"></strong>
        <div class="reflect-saved__actions">
          <a class="btn btn-secondary" id="reflect-reopen-agent" href="#" target="_blank" rel="noopener"></a>
          <button class="btn btn-primary" id="reflect-restart" type="button"></button>
        </div>
      </div>
    </section>

    <section class="screen is-active" id="screen-loading">
      <p>Loading the Companion...</p>
    </section>
  </main>

  <div class="plib-aria-live" id="ariaLive" aria-live="polite"></div>

  <script>
  (function () {
    'use strict';

    let CONFIG = null;
    let state = null;

    function generateUUID() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = (Math.random() * 16) | 0;
        const v = c === 'x' ? r : ((r & 0x3) | 0x8);
        return v.toString(16);
      });
    }
    function isoNow() { return new Date().toISOString(); }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function announce(msg) {
      const live = document.getElementById('ariaLive');
      if (live) live.textContent = msg;
    }

    function freshState() {
      return {
        sessionId: generateUUID(),
        committed: false,
        step1: { id: null, label: null, other_text: null },
        step2: { id: null, label: null, other_text: null },
        step3: {},
        step4: { materials: [], other_text: null },
        assembledPrompt: '',
        reflection: { text: '', optional_name: '' }
      };
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));
      const el = document.getElementById('screen-' + name);
      if (el) {
        el.classList.add('is-active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        announce('Now on ' + name + ' screen');
      }
    }

    // ====================================================================
    // Step 1 — 7 categories + Other peer panel (always-visible textarea)
    // ====================================================================
    function renderStep1() {
      document.getElementById('step1-prompt').textContent = CONFIG.copy.step1_prompt;
      document.getElementById('step1-sub').textContent = CONFIG.copy.step1_subtext;

      const grid = document.getElementById('step1-groups');
      let html = '';
      CONFIG.step1.order.forEach((catId) => {
        const item = CONFIG.step1.items[catId];
        const boundary = (CONFIG.step1.boundary_statements || {})[catId];
        const sel = state.step1.id === catId ? ' selected' : '';
        html += '<div class="tri-group tri-group--clickable' + sel + '" data-step1-id="' + esc(catId) + '" role="radio" tabindex="0" aria-checked="' + (sel ? 'true' : 'false') + '" aria-labelledby="grp-' + esc(catId) + '">';
        html += '  <div class="tri-group-label" id="grp-' + esc(catId) + '">' + esc(item.label) + '</div>';
        html += '  <p class="tri-group-desc">' + esc(item.description) + '</p>';
        if (boundary) {
          html += '  <p class="tri-group-boundary">' + esc(boundary) + '</p>';
        }
        html += '</div>';
      });
      // Other peer panel — always-visible textarea
      const otherId = CONFIG.step1.other.id;
      const otherMax = CONFIG.step1.other.max_chars || 200;
      const otherText = state.step1.other_text || '';
      const otherSel = state.step1.id === otherId ? ' selected' : '';
      html += '<div class="tri-group tri-group-other' + otherSel + '" data-group-id="' + esc(otherId) + '" role="group" aria-labelledby="grp-' + esc(otherId) + '">';
      html += '  <div class="tri-group-label" id="grp-' + esc(otherId) + '">' + esc(CONFIG.copy.step1_other_label) + '</div>';
      html += '  <p class="tri-group-desc">A different teaching goal in your own words. Selects on type.</p>';
      html += '  <textarea class="plib-textarea" id="step1-other-input" maxlength="' + otherMax + '" placeholder="' + esc(CONFIG.copy.step1_other_placeholder) + '" aria-label="Other (describe briefly)">' + esc(otherText) + '</textarea>';
      html += '  <div class="plib-counter"><span id="step1-other-count">' + otherText.length + '</span> / ' + otherMax + ' characters</div>';
      html += '</div>';
      grid.innerHTML = html;

      function selectCategory(id) {
        const item = CONFIG.step1.items[id];
        if (state.step1.id !== id) {
          state.step2 = { id: null, label: null, other_text: null };
          state.step4 = { materials: [], other_text: null };
        }
        state.step1 = { id: id, label: item.label, other_text: null };
        paintStep1Selection();
      }

      grid.querySelectorAll('[data-step1-id]').forEach((card) => {
        const id = card.getAttribute('data-step1-id');
        card.addEventListener('click', () => selectCategory(id));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCategory(id);
          }
        });
      });

      const otherTa = document.getElementById('step1-other-input');
      // D4.4: typing in Other clears any selected category card
      // (handled implicitly by paintStep1Selection — state.step1.id moves to otherId
      // and category cards' selected class is toggled off).
      otherTa.addEventListener('input', () => {
        const v = otherTa.value;
        const cnt = document.getElementById('step1-other-count');
        if (cnt) cnt.textContent = v.length;
        if (v.trim()) {
          if (state.step1.id !== otherId) {
            state.step2 = { id: null, label: null, other_text: null };
            state.step4 = { materials: [], other_text: null };
          }
          state.step1 = { id: otherId, label: 'Other', other_text: v };
        } else if (state.step1.id === otherId) {
          state.step1 = { id: null, label: null, other_text: null };
        }
        paintStep1Selection();
      });
      // Click anywhere in Other panel focuses the textarea
      const otherPanel = grid.querySelector('[data-group-id="' + otherId + '"]');
      otherPanel.addEventListener('click', (e) => {
        if (e.target === otherTa) return;
        otherTa.focus();
      });
      paintStep1Selection();
    }

    function paintStep1Selection() {
      const otherId = CONFIG.step1.other.id;
      document.querySelectorAll('#step1-groups [data-step1-id]').forEach((card) => {
        const id = card.getAttribute('data-step1-id');
        const sel = state.step1.id === id;
        card.classList.toggle('selected', sel);
        card.setAttribute('aria-checked', sel ? 'true' : 'false');
      });
      const otherPanel = document.querySelector('#step1-groups [data-group-id="' + otherId + '"]');
      if (otherPanel) {
        otherPanel.classList.toggle('selected', state.step1.id === otherId);
      }
      document.getElementById('step1-next').disabled = !step1Valid();
    }

    function step1Valid() {
      if (!state.step1.id) return false;
      if (state.step1.id === CONFIG.step1.other.id) {
        return !!(state.step1.other_text && state.step1.other_text.trim());
      }
      return true;
    }

    // ====================================================================
    // Step 2 — list of items OR free-text elaboration when Step 1 is Other
    // ====================================================================
    function renderStep2() {
      document.getElementById('step2-prompt').textContent = CONFIG.copy.step2_prompt;
      document.getElementById('step2-sub').textContent = CONFIG.copy.step2_subtext;
      const body = document.getElementById('step2-body');

      if (state.step1.id === CONFIG.step1.other.id) {
        // Elaboration screen — single textarea
        let html = '';
        html += '<div class="form-field form-field--full">';
        html += '<label for="step2-free-input">Tell us a bit more about what version of this you have in mind.</label>';
        html += '<textarea id="step2-free-input" class="plib-textarea" maxlength="400" placeholder="' + esc(CONFIG.copy.step2_other_placeholder) + '" aria-label="Specific focus (free text)">' + esc(state.step2.other_text || '') + '</textarea>';
        html += '</div>';
        body.innerHTML = html;
        const ta = document.getElementById('step2-free-input');
        ta.addEventListener('input', () => {
          const v = ta.value;
          if (v.trim()) {
            state.step2 = { id: 'other', label: 'Other', other_text: v };
          } else {
            state.step2 = { id: null, label: null, other_text: null };
          }
          state.step4 = { materials: [], other_text: state.step4.other_text };
          document.getElementById('step2-next').disabled = !step2Valid();
        });
        document.getElementById('step2-next').disabled = !step2Valid();
        return;
      }

      const options = (CONFIG.step2 && CONFIG.step2[state.step1.id]) || [];
      let html = '<div class="tri-list">';
      options.forEach((opt) => {
        const sel = state.step2.id === opt.id ? ' selected' : '';
        html += '<button type="button" class="tri-choice' + sel + '" data-step2-id="' + esc(opt.id) + '" role="radio" aria-checked="' + (sel ? 'true' : 'false') + '">';
        html += '<span class="tri-choice-radio" aria-hidden="true"></span>';
        html += '<span class="tri-choice-text">' + esc(opt.label) + '</span>';
        html += '</button>';
      });
      html += '</div>';
      // Other reveal
      const otherShown = state.step2.id === 'other';
      html += '<div class="tri-other-input-wrap' + (otherShown ? '' : ' hidden') + '" id="step2-other-wrap">';
      html += '<label for="step2-other-input" style="display:block;font-weight:500;font-size:var(--fs-sm);margin-bottom:var(--space-2);">Describe in your own words</label>';
      html += '<textarea id="step2-other-input" class="plib-textarea" maxlength="400" placeholder="' + esc(CONFIG.copy.step2_other_placeholder) + '">' + esc(state.step2.other_text || '') + '</textarea>';
      html += '</div>';
      body.innerHTML = html;

      body.querySelectorAll('[data-step2-id]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-step2-id');
          const opt = options.find((o) => o.id === id);
          if (state.step2.id !== id) {
            state.step4 = { materials: [], other_text: null };
          }
          state.step2 = {
            id: id,
            label: opt ? opt.label : id,
            other_text: id === 'other' ? (state.step2.other_text || '') : null
          };
          if (id !== 'other') {
            const oti = document.getElementById('step2-other-input');
            if (oti) oti.value = '';
            state.step2.other_text = null;
          }
          document.getElementById('step2-other-wrap').classList.toggle('hidden', id !== 'other');
          body.querySelectorAll('.tri-choice').forEach((b) => {
            const bsel = b.getAttribute('data-step2-id') === id;
            b.classList.toggle('selected', bsel);
            b.setAttribute('aria-checked', bsel ? 'true' : 'false');
          });
          document.getElementById('step2-next').disabled = !step2Valid();
        });
      });
      const otherTa = document.getElementById('step2-other-input');
      if (otherTa) {
        otherTa.addEventListener('input', () => {
          if (state.step2.id !== 'other') return;
          state.step2.other_text = otherTa.value || '';
          document.getElementById('step2-next').disabled = !step2Valid();
        });
      }
      document.getElementById('step2-next').disabled = !step2Valid();
    }

    function step2Valid() {
      if (state.step1.id === CONFIG.step1.other.id) {
        return !!(state.step2.other_text && state.step2.other_text.trim());
      }
      if (!state.step2.id) return false;
      if (state.step2.id === 'other') return !!(state.step2.other_text && state.step2.other_text.trim());
      return true;
    }

    // ====================================================================
    // Step 3 — context form
    // ====================================================================
    function renderStep3() {
      document.getElementById('step3-prompt').textContent = CONFIG.copy.step3_prompt;
      document.getElementById('step3-sub').textContent = CONFIG.copy.step3_subtext;
      const form = document.getElementById('step3-form');
      form.innerHTML = '';
      CONFIG.step3.fields.forEach((f) => {
        const wrap = document.createElement('div');
        wrap.className = 'form-field' + (f.type === 'textarea' ? ' form-field--full' : '');
        const lbl = document.createElement('label');
        lbl.setAttribute('for', 'f3-' + f.id);
        lbl.textContent = f.label + (f.required ? ' *' : '');
        wrap.appendChild(lbl);
        let input;
        if (f.type === 'select') {
          input = document.createElement('select');
          const blank = document.createElement('option');
          blank.value = '';
          blank.textContent = 'Choose one';
          input.appendChild(blank);
          f.options.forEach((o) => {
            const opt = document.createElement('option');
            opt.value = o;
            opt.textContent = o;
            input.appendChild(opt);
          });
        } else if (f.type === 'textarea') {
          input = document.createElement('textarea');
          if (f.placeholder) input.placeholder = f.placeholder;
          if (f.max_chars) input.maxLength = f.max_chars;
        } else {
          input = document.createElement('input');
          input.type = 'text';
          if (f.placeholder) input.placeholder = f.placeholder;
          if (f.max_chars) input.maxLength = f.max_chars;
        }
        input.id = 'f3-' + f.id;
        input.dataset.fieldId = f.id;
        input.dataset.required = f.required ? '1' : '0';
        if (state.step3[f.id]) input.value = state.step3[f.id];
        wrap.appendChild(input);
        if (f.max_chars && (f.type === 'text' || f.type === 'textarea')) {
          const hint = document.createElement('div');
          hint.className = 'field-hint';
          hint.textContent = 'Up to ' + f.max_chars + ' characters.';
          wrap.appendChild(hint);
        }
        form.appendChild(wrap);
      });
    }

    function captureStep3() {
      const form = document.getElementById('step3-form');
      const inputs = form.querySelectorAll('[data-field-id]');
      const out = {};
      let missing = null;
      inputs.forEach((inp) => {
        const id = inp.dataset.fieldId;
        const val = (inp.value || '').trim();
        out[id] = val;
        if (inp.dataset.required === '1' && !val && !missing) missing = inp;
      });
      state.step3 = out;
      if (missing) {
        missing.focus();
        return false;
      }
      return true;
    }

    // ====================================================================
    // Step 4 — materials per step1 x step2 path, plus appended Other reveal
    // ====================================================================
    function getStep4Materials() {
      if (state.step1.id === CONFIG.step1.other.id) {
        return CONFIG.step4.default || [];
      }
      const branch = CONFIG.step4[state.step1.id];
      if (!branch) return CONFIG.step4.default || [];
      const path = branch[state.step2.id];
      if (path && path.length) return path;
      return CONFIG.step4.default || [];
    }

    function renderStep4() {
      document.getElementById('step4-prompt').textContent = CONFIG.copy.step4_prompt;
      document.getElementById('step4-sub').textContent = CONFIG.copy.step4_subtext;
      const body = document.getElementById('step4-body');
      const options = getStep4Materials();

      let html = '<div class="tri-list">';
      options.forEach((opt) => {
        const sel = state.step4.materials.indexOf(opt.label) !== -1 ? ' selected' : '';
        html += '<button type="button" class="tri-choice' + sel + '" data-step4-id="' + esc(opt.id) + '" data-step4-label="' + esc(opt.label) + '" role="checkbox" aria-checked="' + (sel ? 'true' : 'false') + '">';
        html += '<span class="tri-choice-check" aria-hidden="true"></span>';
        html += '<span class="tri-choice-text">' + esc(opt.label) + '</span>';
        html += '</button>';
      });
      // Always-appended Other checkbox + reveal textarea
      const otherSel = state.step4.other_text != null;
      const otherMax = (CONFIG.step4_other && CONFIG.step4_other.max_chars) || 200;
      const otherLabel = (CONFIG.step4_other && CONFIG.step4_other.label) || 'Other (describe briefly)';
      html += '<button type="button" class="tri-choice' + (otherSel ? ' selected' : '') + '" data-step4-other="1" role="checkbox" aria-checked="' + (otherSel ? 'true' : 'false') + '">';
      html += '<span class="tri-choice-check" aria-hidden="true"></span>';
      html += '<span class="tri-choice-text">' + esc(otherLabel) + '</span>';
      html += '</button>';
      html += '</div>';
      html += '<div class="tri-other-input-wrap' + (otherSel ? '' : ' hidden') + '" id="step4-other-wrap">';
      html += '<label for="step4-other-input" style="display:block;font-weight:500;font-size:var(--fs-sm);margin-bottom:var(--space-2);">What else?</label>';
      html += '<textarea id="step4-other-input" class="plib-textarea" maxlength="' + otherMax + '" placeholder="' + esc(CONFIG.copy.step4_other_placeholder) + '">' + esc(state.step4.other_text || '') + '</textarea>';
      html += '</div>';
      body.innerHTML = html;

      body.querySelectorAll('[data-step4-id]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const label = btn.getAttribute('data-step4-label');
          const idx = state.step4.materials.indexOf(label);
          if (idx === -1) state.step4.materials.push(label);
          else state.step4.materials.splice(idx, 1);
          const sel = state.step4.materials.indexOf(label) !== -1;
          btn.classList.toggle('selected', sel);
          btn.setAttribute('aria-checked', sel ? 'true' : 'false');
          document.getElementById('step4-next').disabled = !step4Valid();
        });
      });
      const otherBtn = body.querySelector('[data-step4-other]');
      otherBtn.addEventListener('click', () => {
        const wrap = document.getElementById('step4-other-wrap');
        const turningOn = state.step4.other_text == null;
        if (turningOn) {
          state.step4.other_text = '';
          wrap.classList.remove('hidden');
          const ti = document.getElementById('step4-other-input');
          if (ti) ti.focus();
        } else {
          state.step4.other_text = null;
          wrap.classList.add('hidden');
          const ti2 = document.getElementById('step4-other-input');
          if (ti2) ti2.value = '';
        }
        otherBtn.classList.toggle('selected', state.step4.other_text != null);
        otherBtn.setAttribute('aria-checked', state.step4.other_text != null ? 'true' : 'false');
        document.getElementById('step4-next').disabled = !step4Valid();
      });
      const otherTa = document.getElementById('step4-other-input');
      if (otherTa) {
        otherTa.addEventListener('input', () => {
          state.step4.other_text = otherTa.value;
          document.getElementById('step4-next').disabled = !step4Valid();
        });
      }
      document.getElementById('step4-next').disabled = !step4Valid();
    }

    function step4Valid() {
      return state.step4.materials.length > 0 ||
        (state.step4.other_text != null && state.step4.other_text.trim().length > 0);
    }

    // ====================================================================
    // Review
    // ====================================================================
    function effectiveStep1Display() {
      if (state.step1.id === CONFIG.step1.other.id) {
        return 'Other: ' + (state.step1.other_text || '');
      }
      return state.step1.label || '';
    }
    function effectiveStep2Display() {
      if (state.step1.id === CONFIG.step1.other.id) {
        return 'Other: ' + (state.step2.other_text || '');
      }
      if (state.step2.id === 'other') {
        return 'Other: ' + (state.step2.other_text || '');
      }
      return state.step2.label || '';
    }
    function step3Display() {
      const s = state.step3;
      const parts = [];
      if (s.course_topic) parts.push({ label: 'Course topic', value: s.course_topic });
      if (s.student_level) parts.push({ label: 'Student level', value: s.student_level });
      if (s.class_size) parts.push({ label: 'Class size', value: s.class_size });
      if (s.class_format) parts.push({ label: 'Class format', value: s.class_format });
      if (s.teaching_context) parts.push({ label: 'Teaching context', value: s.teaching_context });
      return parts;
    }
    function step4Display() {
      const out = state.step4.materials.slice();
      if (state.step4.other_text) out.push('Other: ' + state.step4.other_text);
      return out;
    }

    function renderReview() {
      document.getElementById('review-prompt').textContent = CONFIG.copy.review_prompt;
      document.getElementById('review-sub').textContent = CONFIG.copy.review_subtext;
      document.getElementById('review-commit').textContent = CONFIG.copy.copy_button_label;

      const rows = document.getElementById('review-rows');
      rows.innerHTML = '';
      addReviewRow(rows, 'Goal', effectiveStep1Display(), 'step1');
      addReviewRow(rows, 'Specific focus', effectiveStep2Display(), 'step2');
      const s3parts = step3Display();
      if (s3parts.length) {
        const inner = s3parts.map(p => '<li><strong>' + esc(p.label) + ':</strong> ' + esc(p.value) + '</li>').join('');
        addReviewRow(rows, 'Context', '<ul>' + inner + '</ul>', 'step3', true);
      } else {

        addReviewRow(rows, 'Materials', '<ul>' + inner + '</ul>', 'step4', true);

    function addReviewRow(rowsEl, label, value, backStep, isHtml) {
      const row = document.createElement('div');
      row.className = 'review-row';
      const lbl = document.createElement('div');
      lbl.className = 'review-row__label';
      lbl.textContent = label;
      const val = document.createElement('div');
      val.className = 'review-row__value';
      if (isHtml) val.innerHTML = value;
      else val.textContent = value;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn btn-tertiary';
      btn.textContent = 'Edit';
      btn.addEventListener('click', () => showScreen(backStep));
      row.appendChild(lbl);
      row.appendChild(val);
      row.appendChild(btn);
      rowsEl.appendChild(row);
    }

    // ====================================================================
    // Prompt assembly — handlebars-conditional + single-brace slot substitution
    // ====================================================================

    // Grammar helpers
    function studentLevelArticleAndText(level) {
      const map = {
        'Undergraduate': { article: 'an', text: 'undergraduate' },
        "Master's":      { article: 'a',  text: "Master's" },
        'Doctoral':      { article: 'a',  text: 'doctoral' },
        'Mixed':         { article: 'a',  text: 'mixed-level' }
      };
      return map[level] || null;
    }
    function classFormatPhrase(fmt) {
      const map = {
        'In-person':              'in-person',
        'Online (synchronous)':   'in a synchronous online format',
        'Online (asynchronous)':  'in an asynchronous online format',
        'Hybrid':                 'in a hybrid format'
      };
      return map[fmt] || fmt || '';
    }
    function classSizePhrase(size) {
      if (!size) return null;
      // Lowercase first character so "More than 150" renders cleanly.
      return size.charAt(0).toLowerCase() + size.slice(1);
    }

    function assemblePrompt() {
      let tpl = CONFIG.prompt_template || '';

      // 1) Conditional blocks first ({{#if name}}...{{/if}})
      const cond = {
        teaching_context: state.step3.teaching_context,
        materials_other: state.step4.other_text
      };
      tpl = tpl.replace(/\{\{#if (\w+)\}\}([\s\S]*?)\{\{\/if\}\}\n?/g, (_m, key, body) => {
        return cond[key] && String(cond[key]).trim() ? body : '';
      });

      // 2) Student level — render as "I am an instructor of a {level} course"
      const lvl = studentLevelArticleAndText(state.step3.student_level);
      if (lvl) {
        tpl = tpl.replace(/I am a \{student_level\} instructor/, 'I am an instructor of ' + lvl.article + ' ' + lvl.text + ' course');
      } else {
        // No student level provided: drop the "of a X course" phrase entirely
        tpl = tpl.replace(/I am a \{student_level\} instructor/, 'I am an instructor');
      }

      // 3) Class format — blank value strips the "teaching ..." clause entirely
      if (!state.step3.class_format) {
        tpl = tpl.replace(/ teaching \{class_format\}/, '');
      }

      // 4) Class size — "Not applicable" or blank strips the entire clause
      const sizeRaw = state.step3.class_size;
      if (!sizeRaw || sizeRaw === 'Not applicable') {
        tpl = tpl.replace(/ in a class of \{class_size\} students/, '');
      }

      // 4) Build the slot map
      const goalLabel = state.step1.id === CONFIG.step1.other.id
        ? (state.step1.other_text || 'a goal I described in my own words')
        : (state.step1.label || 'Not specified');

      let focusLabel;
      if (state.step1.id === CONFIG.step1.other.id) {
        focusLabel = state.step2.other_text || 'as described above';
      } else if (state.step2.id === 'other') {
        focusLabel = state.step2.other_text || 'Other';
      } else {
        focusLabel = state.step2.label || 'Not specified';
      }

      let matsLines;
      if (state.step4.materials && state.step4.materials.length > 0) {
        matsLines = state.step4.materials.map(m => '- ' + m).join('\n');
      } else if (state.step4.other_text && state.step4.other_text.trim()) {
        matsLines = '- (see Other materials note below)';
      } else {
        matsLines = (CONFIG.copy && CONFIG.copy.no_materials_text) || 'No specific materials yet, starting from scratch.';
      }

      const slots = {
        course_topic: state.step3.course_topic || 'Not specified',
        student_level: state.step3.student_level || '',
        class_size: classSizePhrase(sizeRaw) || '',
        class_format: classFormatPhrase(state.step3.class_format),
        teaching_context: state.step3.teaching_context || '',
        step1_goal: goalLabel,
        step2_focus: focusLabel,
        materials_list: matsLines,
        materials_other: state.step4.other_text || ''
      };

      // 5) Single-brace slot substitution
      Object.keys(slots).forEach((k) => {
        tpl = tpl.split('{' + k + '}').join(String(slots[k]));
      });

      // 6) Collapse extra newlines
      tpl = tpl.replace(/\n{3,}/g, '\n\n');
      return tpl.replace(/^\n+/, '').replace(/\n+$/, '\n');
    }

    // ====================================================================
    // Bridge
    // ====================================================================
    function renderBridge() {
      document.getElementById('bridge-h').textContent = CONFIG.copy.bridge_header;
      document.getElementById('bridge-confirmation').textContent = CONFIG.copy.bridge_confirmation;
      document.getElementById('bridge-copy-again').textContent = CONFIG.copy.bridge_copy_again_label;
      document.getElementById('bridge-return').textContent = CONFIG.copy.bridge_continue_label;
      document.getElementById('bridge-prompt-label').textContent = CONFIG.copy.bridge_prompt_textarea_label;
      const link = document.getElementById('bridge-agent-link');
      link.href = CONFIG.agent_url;
      link.textContent = CONFIG.copy.bridge_agent_link_label || CONFIG.agent_url;
      document.getElementById('bridge-prompt').value = state.assembledPrompt;

      // Compressed seven-section description (single line).
      const sections = (CONFIG.output_schema || []).map((section) =>
        String(section).replace(/^\s*/, '')
      );
      let inline = '';
      if (sections.length) {
        if (sections.length === 1) {
          inline = sections[0];
        } else {
          inline = sections.slice(0, -1).join(', ') + ', and ' + sections[sections.length - 1];
        }
      }
      const body = document.getElementById('output-schema-line__body');
      body.textContent = 'A structured response with ' + (sections.length || 'several') +
        ' sections in one message: ' + inline + '.';
    }

    // ====================================================================
    // Reflection
    // ====================================================================
    function renderReflection() {
      document.getElementById('reflect-h').textContent = CONFIG.copy.reflection_prompt;
      document.getElementById('reflect-sub').textContent = CONFIG.copy.reflection_subtext;
      const rText = document.getElementById('reflect-r-text');

      rText.value = state.reflection.text || '';
      const rMax = (CONFIG.reflection && CONFIG.reflection.textarea_max_chars) || 2000;
      rText.maxLength = rMax;
      updateWordCount();

      document.getElementById('reflect-r-prompt').textContent = 'Reflection';

      document.getElementById('reflect-name').value = state.reflection.optional_name || '';
      document.getElementById('reflect-save').textContent = CONFIG.copy.save_reflection_label;
      document.getElementById('reflect-saved-msg').textContent = CONFIG.copy.reflection_confirmation;
      const reopen = document.getElementById('reflect-reopen-agent');
      reopen.href = CONFIG.agent_url;
      reopen.textContent = CONFIG.copy.reopen_companion_label;
      document.getElementById('reflect-restart').textContent = CONFIG.copy.new_route_label;
      document.getElementById('reflect-saved').hidden = true;
      document.getElementById('reflect-save').removeAttribute('aria-disabled');
    }

    function updateWordCount() {
      const t = document.getElementById('reflect-r-text').value || '';
      const words = t.trim().length ? t.trim().split(/\s+/).length : 0;
      const minW = (CONFIG.reflection && CONFIG.reflection.textarea_suggested_min_words) || 50;
      const maxW = (CONFIG.reflection && CONFIG.reflection.textarea_suggested_max_words) || 250;
      document.getElementById('reflect-r-counter').textContent =
        words + ' words  (suggested ' + minW + ' to ' + maxW + ')';
    }

    // ====================================================================
    // Clipboard
    // ====================================================================
    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
      }
      return Promise.resolve(fallbackCopy(text));
    }
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    function flashCopy(btn) {
      btn.dataset.copied = 'true';
      setTimeout(() => { delete btn.dataset.copied; }, 1200);
    }

    // ====================================================================
    // Submission
    // ====================================================================
    function submitToGoogleForm(type, sessionId, timestamp, payload) {
      try {
        const fd = new FormData();
        fd.append(CONFIG.form.entry_type, type);
        fd.append(CONFIG.form.entry_session_id, sessionId);
        fd.append(CONFIG.form.entry_timestamp, timestamp);
        fd.append(CONFIG.form.entry_payload, JSON.stringify(payload));
        return fetch(CONFIG.form.submission_url, {
          method: 'POST',
          mode: 'no-cors',
          body: fd
        }).catch(err => {
          console.error('[companion] submission failed', type, err);
        });
      } catch (err) {
        console.error('[companion] submission threw', err);
        return Promise.resolve();
      }
    }

    // ====================================================================
    // Commit, save, restart
    // ====================================================================
    function commitReview() {
      state.assembledPrompt = assemblePrompt();
      const timestamp = isoNow();
      const payload = {
        type: 'triage',
        session_id: state.sessionId,
        timestamp: timestamp,
        step1: { id: state.step1.id, label: state.step1.label, other_text: state.step1.other_text },
        step2: { id: state.step2.id, label: state.step2.label, other_text: state.step2.other_text },
        step3: state.step3,
        step4: { materials: state.step4.materials, other_text: state.step4.other_text },
        assembled_prompt: state.assembledPrompt
      };
      copyToClipboard(state.assembledPrompt);
      window.open(CONFIG.agent_url, '_blank', 'noopener');
      submitToGoogleForm('triage', state.sessionId, timestamp, payload);
      state.committed = true;
      renderBridge();
      showScreen('bridge');
    }

    function saveReflection() {
      const text = document.getElementById('reflect-r-text').value.trim();
      const name = document.getElementById('reflect-name').value.trim();
      state.reflection = {
        text: text,
        optional_name: name || null
      };
      const timestamp = isoNow();
      const payload = {
        type: 'reflection',
        session_id: state.sessionId,
        timestamp: timestamp,
        reflection_text: text,
        optional_name: name || null
      };
      submitToGoogleForm('reflection', state.sessionId, timestamp, payload);
      document.getElementById('reflect-saved').hidden = false;
      document.getElementById('reflect-save').setAttribute('aria-disabled', 'true');
      announce('Reflection saved.');
    }

    function restart() {
      state = freshState();
      renderStep1();
      renderStep3();
      // step2 and step4 will render lazily when reached
      renderReflection();
      showScreen('step1');
    }

    // ====================================================================
    // Wiring
    // ====================================================================
    function wire() {
      document.getElementById('step1-next').addEventListener('click', () => {
        if (step1Valid()) { renderStep2(); showScreen('step2'); }
      });
      document.getElementById('step2-next').addEventListener('click', () => {
        if (step2Valid()) { renderStep3(); showScreen('step3'); }
      });
      document.getElementById('step3-next').addEventListener('click', () => {
        if (captureStep3()) { renderStep4(); showScreen('step4'); }
      });
      document.getElementById('step4-next').addEventListener('click', () => {
        if (step4Valid()) { renderReview(); showScreen('review'); }
      });
      document.querySelectorAll('[data-back]').forEach((b) => {
        b.addEventListener('click', () => {
          const target = b.dataset.back;
          if (target === 'step2') renderStep2();
          else if (target === 'step4') renderStep4();
          showScreen(target);
        });
      });
      document.getElementById('review-commit').addEventListener('click', commitReview);

      document.getElementById('bridge-copy-again').addEventListener('click', (e) => {
        copyToClipboard(state.assembledPrompt);
        flashCopy(e.currentTarget);
      });
      document.getElementById('bridge-return').addEventListener('click', () => {
        renderReflection();
        showScreen('reflection');
      });

      document.getElementById('reflect-r-text').addEventListener('input', updateWordCount);
      document.getElementById('reflect-save').addEventListener('click', saveReflection);
      document.getElementById('reflect-restart').addEventListener('click', restart);
    }

    function init(cfg) {
      CONFIG = cfg;
      state = freshState();
      renderStep1();
      renderStep3();
      renderReflection();
      wire();
      showScreen('step1');
    }

    fetch('config.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('config.json HTTP ' + r.status);
        return r.json();
      })
      .then(init)
      .catch(err => {
        console.error('[companion] failed to load config', err);
        const loader = document.getElementById('screen-loading');
        loader.innerHTML =
          '<h2 class="tri-step-prompt">The Companion could not load</h2>' +
          '<p class="tri-step-sub">Configuration failed to load. If you are viewing this directly from disk, serve the directory through a local web server so config.json can be fetched.</p>';
      });
  })();
  </script>
</body>
</html>
