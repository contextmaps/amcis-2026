<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Companion · Teaching Inside the Thread</title>
  <meta name="description" content="The hands-on artifact for the AMCIS 2026 workshop on an AI-Centered Pedagogy.">
  <link rel="stylesheet" href="../assets/shared.css">
  <style>
    /* ---------- Companion-specific layout ---------- */
    .companion-wrap {
      padding: var(--space-8) 0 var(--space-16);
    }
    .screen {
      display: none;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
      animation: screenFade 0.18s ease;
    }
    .screen.is-active { display: block; }
    @keyframes screenFade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .screen-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
      margin-bottom: var(--space-2);
    }
    .screen-head h2 {
      font-size: var(--fs-2xl);
      margin: 0;
      color: var(--fg);
    }
    .screen-subhead {
      color: var(--fg-muted);
      margin-bottom: var(--space-6);
      font-size: var(--fs-base);
    }
    .screen-actions {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-8);
      flex-wrap: wrap;
    }
    .screen-actions__right {
      display: flex;
      gap: var(--space-3);
      margin-left: auto;
    }

    /* Step 1 grid */
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
    }
    @media (max-width: 1023px) { .grid-cards { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .grid-cards { grid-template-columns: 1fr; } }

    .card-choice {
      display: flex;
      flex-direction: column;
      text-align: left;
      padding: var(--space-5);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
      font: inherit;
      color: var(--fg);
      min-height: 120px;
    }
    .card-choice:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
    }
    .card-choice.is-selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: var(--shadow-md);
    }
    .card-choice__title {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: var(--space-2);
    }
    .card-choice__desc {
      font-size: var(--fs-sm);
      color: var(--fg-muted);
      line-height: 1.5;
    }

    /* Step 2 list (single column with placeholders) */
    .list-choices {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    /* Step 3 form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-5);
    }
    @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field { display: flex; flex-direction: column; gap: var(--space-2); }
    .form-field--full { grid-column: 1 / -1; }
    .form-field label {
      font-weight: 500;
      font-size: var(--fs-sm);
      color: var(--fg);
    }
    .form-field input[type="text"],
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font: inherit;
      color: var(--fg);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
    }
    .form-field input[type="text"]:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 0, 49, 0.15);
    }
    .form-field textarea { min-height: 90px; resize: vertical; }

    /* Step 4 reuses list-choices + add-your-own */
    .other-input {
      margin-top: var(--space-3);
      display: none;
    }
    .other-input.is-visible { display: block; }

    /* Review */
    .review-rows {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .review-row {
      display: grid;
      grid-template-columns: 12rem 1fr auto;
      gap: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      align-items: start;
    }
    @media (max-width: 720px) {
      .review-row { grid-template-columns: 1fr; }
    }
    .review-row__label {
      font-size: var(--fs-sm);
      color: var(--fg-muted);
      font-weight: 500;
    }
    .review-row__value {
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Bridge */
    .bridge-callout {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-5);
    }
    .agent-link-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      background: #ffffff;
      flex-wrap: wrap;
    }
    .agent-link-box a {
      word-break: break-all;
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
    }
    .read-only-prompt {
      width: 100%;
      min-height: 200px;
      padding: var(--space-4);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      line-height: 1.5;
      color: var(--fg);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      resize: vertical;
    }
    .framing-line {
      margin-top: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: rgba(22, 163, 74, 0.06);
      border-left: 3px solid var(--block-s);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: var(--fs-sm);
      color: var(--fg-muted);
    }

    /* Reflection sub-blocks */
    .reflect-stack {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }
    .reflect-block {
      padding: var(--space-5);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      position: relative;
    }
    .reflect-block::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }
    .reflect-block--r::before { background: var(--block-r); }
    .reflect-block--q::before { background: var(--block-q); }
    .reflect-block--o::before { background: var(--block-o); }

    .reflect-block__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }
    .reflect-block__prompt {
      font-weight: 500;
      color: var(--fg);
    }
    .checkbox-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .checkbox-list label {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      line-height: 1.45;
    }
    .checkbox-list label:hover { background: rgba(0,0,0,0.03); }
    .checkbox-list input { margin-top: 0.2rem; }

    .ranked-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .ranked-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }
    .ranked-item__index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      background: var(--block-o);
      color: #ffffff;
      font-weight: 600;
      font-size: var(--fs-sm);
      flex-shrink: 0;
    }
    .ranked-item__label {
      flex: 1;
    }
    .ranked-item__controls {
      display: flex;
      gap: var(--space-1);
    }
    .ranked-item__btn {
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid var(--border-strong);
      background: #ffffff;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 1rem;
      color: var(--fg);
    }
    .ranked-item__btn:hover { background: var(--bg-soft); }
    .ranked-item__btn[disabled] { opacity: 0.3; cursor: not-allowed; }

    .reflect-saved {
      padding: var(--space-5);
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid var(--success);
      border-radius: var(--radius-md);
      margin-top: var(--space-6);
    }
    .reflect-saved__actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-4);
      flex-wrap: wrap;
    }

    .name-field {
      margin-top: var(--space-6);
      max-width: 24rem;
    }

    /* Block top accent on each screen via shared .block-accent;
       we just hoist the label onto a row with the heading. */
    .screen .block-label { margin-bottom: var(--space-2); }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header__title"><a href="../">Teaching Inside the Thread</a></div>
    <a class="page-header__home" href="../">Home</a>
  </header>

  <main class="container container--prose companion-wrap" id="companionMain">
    <h1 class="visually-hidden">The Companion</h1>

    <!-- ========== Step 1 ========== -->
    <section class="screen block-accent block-accent--r0" id="screen-step1" aria-labelledby="step1-h">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <div class="screen-head">
        <h2 id="step1-h"></h2>
      </div>
      <p class="screen-subhead" id="step1-sub"></p>
      <div class="grid-cards" id="step1-grid" role="radiogroup" aria-labelledby="step1-h"></div>
      <div class="other-input" id="step1-other-wrap">
        <label for="step1-other-text" class="visually-hidden">Describe other</label>
        <input type="text" id="step1-other-text" placeholder="Describe your teaching goal in a phrase">
      </div>
      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step1-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <!-- ========== Step 2 ========== -->
    <section class="screen block-accent block-accent--r0" id="screen-step2" aria-labelledby="step2-h">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <div class="screen-head">
        <h2 id="step2-h"></h2>
      </div>
      <p class="screen-subhead" id="step2-sub"></p>
      <div class="list-choices" id="step2-list" role="radiogroup" aria-labelledby="step2-h"></div>
      <div class="other-input" id="step2-other-wrap">
        <input type="text" id="step2-other-text" placeholder="Describe a different focus in a phrase">
      </div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step1" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step2-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <!-- ========== Step 3 ========== -->
    <section class="screen block-accent block-accent--r0" id="screen-step3" aria-labelledby="step3-h">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <div class="screen-head">
        <h2 id="step3-h"></h2>
      </div>
      <p class="screen-subhead" id="step3-sub"></p>
      <div class="form-grid" id="step3-form"></div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step2" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step3-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <!-- ========== Step 4 ========== -->
    <section class="screen block-accent block-accent--r0" id="screen-step4" aria-labelledby="step4-h">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <div class="screen-head">
        <h2 id="step4-h"></h2>
      </div>
      <p class="screen-subhead" id="step4-sub"></p>
      <div class="list-choices" id="step4-list" role="radiogroup" aria-labelledby="step4-h"></div>
      <div class="other-input" id="step4-other-wrap">
        <input type="text" id="step4-other-text" placeholder="Describe another material in a phrase">
      </div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step3" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="step4-next" type="button">Continue</button>
        </div>
      </div>
    </section>

    <!-- ========== Review ========== -->
    <section class="screen block-accent block-accent--r0" id="screen-review" aria-labelledby="review-h">
      <span class="block-label block-label--r0"><span class="block-label__dot"></span>Session opener</span>
      <div class="screen-head">
        <h2 id="review-h"></h2>
      </div>
      <p class="screen-subhead" id="review-sub"></p>
      <div class="review-rows" id="review-rows"></div>
      <div class="screen-actions">
        <button class="btn btn-tertiary" data-back="step4" type="button">Back</button>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="review-commit" type="button"></button>
        </div>
      </div>
    </section>

    <!-- ========== Bridge ========== -->
    <section class="screen block-accent block-accent--s" id="screen-bridge" aria-labelledby="bridge-h">
      <span class="block-label block-label--s"><span class="block-label__dot"></span>Prompt block</span>
      <div class="screen-head">
        <h2 id="bridge-h"></h2>
      </div>
      <div class="bridge-callout" id="bridge-confirmation"></div>
      <div class="agent-link-box">
        <a href="#" id="bridge-agent-link" target="_blank" rel="noopener"></a>
        <button class="btn btn-secondary plib-copy-btn" id="bridge-copy-again" type="button" data-copied-label="Copied"></button>
      </div>
      <textarea class="read-only-prompt" id="bridge-prompt" readonly aria-label="Assembled prompt"></textarea>
      <div class="framing-line" id="bridge-framing"></div>
      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="bridge-return" type="button"></button>
        </div>
      </div>
    </section>

    <!-- ========== Reflection ========== -->
    <section class="screen block-accent block-accent--r" id="screen-reflection" aria-labelledby="reflect-h">
      <span class="block-label block-label--r"><span class="block-label__dot"></span>Reflection block</span>
      <div class="screen-head">
        <h2 id="reflect-h"></h2>
      </div>
      <p class="screen-subhead" id="reflect-sub"></p>

      <div class="reflect-stack" id="reflect-stack">
        <div class="reflect-block reflect-block--r" id="reflect-r-block">
          <div class="reflect-block__header">
            <span class="reflect-block__prompt" id="reflect-r-prompt"></span>
            <span class="block-label block-label--r"><span class="block-label__dot"></span>R</span>
          </div>
          <textarea class="plib-textarea" id="reflect-r-text" aria-label="Reflection text"></textarea>
          <div class="plib-counter" id="reflect-r-counter">0 words</div>
        </div>

        <div class="reflect-block reflect-block--q" id="reflect-q-block">
          <div class="reflect-block__header">
            <span class="reflect-block__prompt" id="reflect-q-prompt"></span>
            <span class="block-label block-label--q"><span class="block-label__dot"></span>Q</span>
          </div>
          <div class="checkbox-list" id="reflect-q-list"></div>
        </div>

        <div class="reflect-block reflect-block--o" id="reflect-o-block">
          <div class="reflect-block__header">
            <span class="reflect-block__prompt" id="reflect-o-prompt"></span>
            <span class="block-label block-label--o"><span class="block-label__dot"></span>O</span>
          </div>
          <ul class="ranked-list" id="reflect-o-list"></ul>
        </div>
      </div>

      <div class="name-field">
        <label for="reflect-name" id="reflect-name-label"></label>
        <input type="text" id="reflect-name" class="form-field" placeholder="">
      </div>

      <div class="screen-actions">
        <span></span>
        <div class="screen-actions__right">
          <button class="btn btn-primary" id="reflect-save" type="button"></button>
        </div>
      </div>

      <div class="reflect-saved" id="reflect-saved" hidden>
        <strong id="reflect-saved-msg"></strong>
        <div class="reflect-saved__actions">
          <button class="btn btn-primary" id="reflect-try-x" type="button"></button>
          <button class="btn btn-secondary" id="reflect-restart" type="button"></button>
        </div>
      </div>
    </section>

    <!-- ========== X ========== -->
    <section class="screen block-accent block-accent--x" id="screen-x" aria-labelledby="x-h">
      <span class="block-label block-label--x"><span class="block-label__dot"></span>Exploration block</span>
      <div class="screen-head">
        <h2 id="x-h"></h2>
      </div>
      <p class="screen-subhead" id="x-orient"></p>
      <div class="screen-actions">
        <button class="btn btn-secondary plib-copy-btn" id="x-copy-prefix" type="button" data-copied-label="Copied"></button>
        <div class="screen-actions__right">
          <a class="btn btn-secondary" id="x-reopen-agent" href="#" target="_blank" rel="noopener"></a>
          <button class="btn btn-primary" id="x-done" type="button"></button>
        </div>
      </div>
    </section>

    <!-- ========== Loading / error fallback ========== -->
    <section class="screen is-active" id="screen-loading">
      <p>Loading the Companion...</p>
    </section>

  </main>

  <div class="plib-aria-live" id="ariaLive" aria-live="polite"></div>

  <script>
  (function () {
    'use strict';

    let CONFIG = null;
    let companionState = null;
    let oOrder = [];

    function generateUUID() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = (Math.random() * 16) | 0;
        const v = c === 'x' ? r : ((r & 0x3) | 0x8);
        return v.toString(16);
      });
    }

    function isoNow() { return new Date().toISOString(); }

    function announce(msg) {
      const live = document.getElementById('ariaLive');
      if (live) live.textContent = msg;
    }

    function freshState() {
      return {
        sessionId: generateUUID(),
        committed: false,
        step1: { id: null, label: '', isOther: false, otherText: '' },
        step2: { id: null, label: '', isOther: false, otherText: '' },
        step3: {},
        step4: { id: null, label: '', isOther: false, otherText: '' },
        assembledPrompt: '',
        reflection: { text: '', q_responses: [], o_responses: [], optional_name: '' }
      };
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));
      const el = document.getElementById('screen-' + name);
      if (el) {
        el.classList.add('is-active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        announce('Now on ' + name + ' screen');
      }
    }

    // ---------- Rendering helpers ----------
    function renderStep1() {
      document.getElementById('step1-h').textContent = CONFIG.step1.heading;
      document.getElementById('step1-sub').textContent = CONFIG.step1.subhead;
      const grid = document.getElementById('step1-grid');
      grid.innerHTML = '';
      CONFIG.step1.categories.forEach((cat) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'card-choice';
        btn.setAttribute('role', 'radio');
        btn.setAttribute('aria-checked', 'false');
        btn.dataset.id = cat.id;
        btn.dataset.label = cat.label;
        btn.dataset.isOther = cat.isOther ? '1' : '0';
        btn.innerHTML =
          '<span class="card-choice__title"></span>' +
          '<span class="card-choice__desc"></span>';
        btn.querySelector('.card-choice__title').textContent = cat.label;
        btn.querySelector('.card-choice__desc').textContent = cat.description;
        btn.addEventListener('click', () => selectStep1(cat, btn));
        grid.appendChild(btn);
      });
      // Restore selection
      if (companionState.step1.id) {
        const sel = grid.querySelector('[data-id="' + companionState.step1.id + '"]');
        if (sel) sel.classList.add('is-selected');
        const wrap = document.getElementById('step1-other-wrap');
        wrap.classList.toggle('is-visible', companionState.step1.isOther);
        document.getElementById('step1-other-text').value = companionState.step1.otherText || '';
      }
    }

    function selectStep1(cat, btn) {
      document.querySelectorAll('#step1-grid .card-choice').forEach(c => {
        c.classList.remove('is-selected');
        c.setAttribute('aria-checked', 'false');
      });
      btn.classList.add('is-selected');
      btn.setAttribute('aria-checked', 'true');
      companionState.step1 = {
        id: cat.id,
        label: cat.label,
        isOther: !!cat.isOther,
        otherText: companionState.step1.otherText
      };
      const wrap = document.getElementById('step1-other-wrap');
      wrap.classList.toggle('is-visible', !!cat.isOther);
    }

    function renderStep2() {
      document.getElementById('step2-h').textContent = CONFIG.step2.heading;
      document.getElementById('step2-sub').textContent = CONFIG.step2.subhead;
      const list = document.getElementById('step2-list');
      list.innerHTML = '';
      const items = (CONFIG.step2.items_by_category[companionState.step1.id] || []).slice();
      items.push(CONFIG.step2.other_option);
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'card-choice';
        btn.setAttribute('role', 'radio');
        btn.setAttribute('aria-checked', 'false');
        btn.dataset.id = item.id;
        btn.dataset.label = item.label;
        btn.dataset.isOther = item.isOther ? '1' : '0';
        btn.innerHTML = '<span class="card-choice__title"></span>';
        btn.querySelector('.card-choice__title').textContent = item.label;
        btn.addEventListener('click', () => selectStep2(item, btn));
        list.appendChild(btn);
      });
      if (companionState.step2.id) {
        const sel = list.querySelector('[data-id="' + companionState.step2.id + '"]');
        if (sel) sel.classList.add('is-selected');
        document.getElementById('step2-other-wrap').classList.toggle('is-visible', companionState.step2.isOther);
        document.getElementById('step2-other-text').value = companionState.step2.otherText || '';
      }
    }

    function selectStep2(item, btn) {
      document.querySelectorAll('#step2-list .card-choice').forEach(c => {
        c.classList.remove('is-selected');
        c.setAttribute('aria-checked', 'false');
      });
      btn.classList.add('is-selected');
      btn.setAttribute('aria-checked', 'true');
      companionState.step2 = {
        id: item.id,
        label: item.label,
        isOther: !!item.isOther,
        otherText: companionState.step2.otherText
      };
      document.getElementById('step2-other-wrap').classList.toggle('is-visible', !!item.isOther);
    }

    function renderStep3() {
      document.getElementById('step3-h').textContent = CONFIG.step3.heading;
      document.getElementById('step3-sub').textContent = CONFIG.step3.subhead;
      const form = document.getElementById('step3-form');
      form.innerHTML = '';
      CONFIG.step3.fields.forEach(f => {
        const wrap = document.createElement('div');
        wrap.className = 'form-field' + (f.type === 'textarea' ? ' form-field--full' : '');
        const lbl = document.createElement('label');
        lbl.setAttribute('for', 'f3-' + f.id);
        lbl.textContent = f.label + (f.required ? ' *' : '');
        wrap.appendChild(lbl);
        let input;
        if (f.type === 'select') {
          input = document.createElement('select');
          const blank = document.createElement('option');
          blank.value = '';
          blank.textContent = 'Choose one';
          input.appendChild(blank);
          f.options.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o;
            opt.textContent = o;
            input.appendChild(opt);
          });
        } else if (f.type === 'textarea') {
          input = document.createElement('textarea');
          if (f.placeholder) input.placeholder = f.placeholder;
        } else {
          input = document.createElement('input');
          input.type = 'text';
          if (f.placeholder) input.placeholder = f.placeholder;
        }
        input.id = 'f3-' + f.id;
        input.dataset.fieldId = f.id;
        input.dataset.required = f.required ? '1' : '0';
        if (companionState.step3[f.id]) input.value = companionState.step3[f.id];
        wrap.appendChild(input);
        form.appendChild(wrap);
      });
    }

    function captureStep3() {
      const form = document.getElementById('step3-form');
      const inputs = form.querySelectorAll('[data-field-id]');
      const out = {};
      let missing = null;
      inputs.forEach(inp => {
        const id = inp.dataset.fieldId;
        const val = (inp.value || '').trim();
        out[id] = val;
        if (inp.dataset.required === '1' && !val && !missing) missing = inp;
      });
      companionState.step3 = out;
      if (missing) {
        missing.focus();
        return false;
      }
      return true;
    }

    function renderStep4() {
      document.getElementById('step4-h').textContent = CONFIG.step4.heading;
      document.getElementById('step4-sub').textContent = CONFIG.step4.subhead;
      const list = document.getElementById('step4-list');
      list.innerHTML = '';
      const items = [CONFIG.step4.placeholder_item, CONFIG.step4.other_option];
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'card-choice';
        btn.setAttribute('role', 'radio');
        btn.dataset.id = item.id;
        btn.dataset.label = item.label;
        btn.dataset.isOther = item.isOther ? '1' : '0';
        btn.innerHTML = '<span class="card-choice__title"></span>';
        btn.querySelector('.card-choice__title').textContent = item.label;
        btn.addEventListener('click', () => selectStep4(item, btn));
        list.appendChild(btn);
      });
      if (companionState.step4.id) {
        const sel = list.querySelector('[data-id="' + companionState.step4.id + '"]');
        if (sel) sel.classList.add('is-selected');
        document.getElementById('step4-other-wrap').classList.toggle('is-visible', companionState.step4.isOther);
        document.getElementById('step4-other-text').value = companionState.step4.otherText || '';
      }
    }

    function selectStep4(item, btn) {
      document.querySelectorAll('#step4-list .card-choice').forEach(c => {
        c.classList.remove('is-selected');
        c.setAttribute('aria-checked', 'false');
      });
      btn.classList.add('is-selected');
      btn.setAttribute('aria-checked', 'true');
      companionState.step4 = {
        id: item.id,
        label: item.label,
        isOther: !!item.isOther,
        otherText: companionState.step4.otherText
      };
      document.getElementById('step4-other-wrap').classList.toggle('is-visible', !!item.isOther);
    }

    function effectiveLabel(stateSlice) {
      if (!stateSlice || !stateSlice.id) return '';
      if (stateSlice.isOther) {
        return (stateSlice.otherText || '').trim() || 'Other';
      }
      return stateSlice.label || '';
    }

    function renderReview() {
      document.getElementById('review-h').textContent = CONFIG.review.heading;
      document.getElementById('review-sub').textContent = CONFIG.review.subhead;
      document.getElementById('review-commit').textContent = CONFIG.review.primary_button;
      const rows = document.getElementById('review-rows');
      rows.innerHTML = '';

      const items = [
        { back: 'step1', label: 'Teaching focus area', value: effectiveLabel(companionState.step1) },
        { back: 'step2', label: 'Specific focus', value: effectiveLabel(companionState.step2) },
        { back: 'step3', label: 'Course topic', value: companionState.step3.course_topic || '' },
        { back: 'step3', label: 'Student level', value: companionState.step3.student_level || '' },
        { back: 'step3', label: 'Class format', value: companionState.step3.class_format || '' },
        { back: 'step3', label: 'Current approach', value: companionState.step3.current_approach || '(blank)' },
        { back: 'step3', label: 'Institution type', value: companionState.step3.institution_type || '(blank)' },
        { back: 'step4', label: 'Materials', value: effectiveLabel(companionState.step4) }
      ];
      items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'review-row';
        const lbl = document.createElement('div');
        lbl.className = 'review-row__label';
        lbl.textContent = it.label;
        const val = document.createElement('div');
        val.className = 'review-row__value';
        val.textContent = it.value;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-tertiary';
        btn.textContent = CONFIG.review.edit_label;
        btn.addEventListener('click', () => showScreen(it.back));
        row.appendChild(lbl);
        row.appendChild(val);
        row.appendChild(btn);
        rows.appendChild(row);
      });
    }

    function assemblePrompt() {
      const slots = {
        step1_label: effectiveLabel(companionState.step1) || '(unspecified)',
        step2_label: effectiveLabel(companionState.step2) || '(unspecified)',
        course_topic: companionState.step3.course_topic || '(unspecified)',
        student_level: companionState.step3.student_level || '(unspecified)',
        class_format: companionState.step3.class_format || '(unspecified)',
        current_approach: companionState.step3.current_approach || '(not specified, designing from scratch or unsure)',
        institution_type: companionState.step3.institution_type || '(unspecified)',
        step4_label: effectiveLabel(companionState.step4) || '(unspecified)'
      };
      let tpl = CONFIG.prompt_template || '';
      Object.keys(slots).forEach(k => {
        tpl = tpl.split('{' + k + '}').join(slots[k]);
      });
      return tpl;
    }

    // ---------- Bridge ----------
    function renderBridge() {
      document.getElementById('bridge-h').textContent = CONFIG.bridge.heading;
      document.getElementById('bridge-confirmation').textContent = CONFIG.bridge.confirmation;
      document.getElementById('bridge-framing').textContent = CONFIG.bridge.m_open_framing;
      document.getElementById('bridge-copy-again').textContent = CONFIG.bridge.copy_again_label;
      document.getElementById('bridge-return').textContent = CONFIG.bridge.return_button;
      const link = document.getElementById('bridge-agent-link');
      link.href = CONFIG.agent_url;
      link.textContent = CONFIG.bridge.agent_link_label || CONFIG.agent_url;
      document.getElementById('bridge-prompt').value = companionState.assembledPrompt;
    }

    // ---------- Reflection ----------
    function renderReflection() {
      document.getElementById('reflect-h').textContent = CONFIG.reflection.heading;
      document.getElementById('reflect-sub').textContent = CONFIG.reflection.subhead;
      document.getElementById('reflect-r-prompt').textContent = CONFIG.reflection.r_block.prompt;
      const rText = document.getElementById('reflect-r-text');
      rText.placeholder = CONFIG.reflection.r_block.placeholder || '';
      rText.value = companionState.reflection.text || '';
      updateWordCount();

      document.getElementById('reflect-q-prompt').textContent = CONFIG.reflection.q_block.prompt;
      const qList = document.getElementById('reflect-q-list');
      qList.innerHTML = '';
      CONFIG.reflection.q_block.options.forEach((opt, i) => {
        const id = 'q-' + i;
        const lab = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = id;
        cb.value = opt;
        if (companionState.reflection.q_responses.indexOf(opt) !== -1) cb.checked = true;
        lab.appendChild(cb);
        const span = document.createElement('span');
        span.textContent = opt;
        lab.appendChild(span);
        qList.appendChild(lab);
      });

      document.getElementById('reflect-o-prompt').textContent = CONFIG.reflection.o_block.prompt;
      if (!oOrder.length) {
        oOrder = (companionState.reflection.o_responses.length
          ? companionState.reflection.o_responses.slice()
          : CONFIG.reflection.o_block.items.slice());
      }
      renderOList();

      document.getElementById('reflect-name-label').textContent = CONFIG.reflection.name_field_label;
      document.getElementById('reflect-name').value = companionState.reflection.optional_name || '';
      document.getElementById('reflect-save').textContent = CONFIG.reflection.save_button;
      document.getElementById('reflect-saved-msg').textContent = CONFIG.reflection.saved_message;
      document.getElementById('reflect-try-x').textContent = CONFIG.reflection.next_actions.try_x;
      document.getElementById('reflect-restart').textContent = CONFIG.reflection.next_actions.restart;
      document.getElementById('reflect-saved').hidden = true;
    }

    function renderOList() {
      const list = document.getElementById('reflect-o-list');
      list.innerHTML = '';
      oOrder.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'ranked-item';
        li.innerHTML =
          '<span class="ranked-item__index"></span>' +
          '<span class="ranked-item__label"></span>' +
          '<span class="ranked-item__controls">' +
            '<button type="button" class="ranked-item__btn" data-dir="up" aria-label="Move up">&uarr;</button>' +
            '<button type="button" class="ranked-item__btn" data-dir="down" aria-label="Move down">&darr;</button>' +
          '</span>';
        li.querySelector('.ranked-item__index').textContent = idx + 1;
        li.querySelector('.ranked-item__label').textContent = item;
        const upBtn = li.querySelector('[data-dir="up"]');
        const downBtn = li.querySelector('[data-dir="down"]');
        if (idx === 0) upBtn.disabled = true;
        if (idx === oOrder.length - 1) downBtn.disabled = true;
        upBtn.addEventListener('click', () => moveO(idx, -1));
        downBtn.addEventListener('click', () => moveO(idx, 1));
        list.appendChild(li);
      });
    }

    function moveO(i, delta) {
      const j = i + delta;
      if (j < 0 || j >= oOrder.length) return;
      const tmp = oOrder[i];
      oOrder[i] = oOrder[j];
      oOrder[j] = tmp;
      renderOList();
      announce('Moved item ' + (j + 1));
    }

    function updateWordCount() {
      const t = document.getElementById('reflect-r-text').value || '';
      const words = t.trim().length ? t.trim().split(/\s+/).length : 0;
      const min = CONFIG.reflection.r_block.min_suggested;
      const max = CONFIG.reflection.r_block.max_suggested;
      const counter = document.getElementById('reflect-r-counter');
      counter.textContent = words + ' words  (suggested ' + min + ' to ' + max + ')';
    }

    // ---------- X ----------
    function renderX() {
      document.getElementById('x-h').textContent = CONFIG.x_block.heading;
      document.getElementById('x-orient').textContent = CONFIG.x_block.orienting_text;
      document.getElementById('x-copy-prefix').textContent = CONFIG.x_block.copy_prefix_label;
      const reopen = document.getElementById('x-reopen-agent');
      reopen.href = CONFIG.agent_url;
      reopen.textContent = CONFIG.x_block.reopen_agent_label;
      document.getElementById('x-done').textContent = CONFIG.x_block.done_label;
    }

    // ---------- Clipboard ----------
    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
      }
      return Promise.resolve(fallbackCopy(text));
    }
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    function flashCopy(btn) {
      btn.dataset.copied = 'true';
      setTimeout(() => { delete btn.dataset.copied; }, 1200);
    }

    // ---------- Submission ----------
    function submitToGoogleForm(type, sessionId, timestamp, payload) {
      try {
        const fd = new FormData();
        fd.append(CONFIG.form.entry_type, type);
        fd.append(CONFIG.form.entry_session_id, sessionId);
        fd.append(CONFIG.form.entry_timestamp, timestamp);
        fd.append(CONFIG.form.entry_payload, JSON.stringify(payload));
        return fetch(CONFIG.form.submission_url, {
          method: 'POST',
          mode: 'no-cors',
          body: fd
        }).catch(err => {
          console.error('[companion] submission failed', type, err);
        });
      } catch (err) {
        console.error('[companion] submission threw', err);
        return Promise.resolve();
      }
    }

    // ---------- Commit (Review -> Bridge) ----------
    function commitReview() {
      companionState.assembledPrompt = assemblePrompt();
      const timestamp = isoNow();
      const payload = {
        type: 'triage',
        session_id: companionState.sessionId,
        timestamp: timestamp,
        step1: { id: companionState.step1.id, label: effectiveLabel(companionState.step1) },
        step2: { id: companionState.step2.id, label: effectiveLabel(companionState.step2) },
        step3: companionState.step3,
        step4: { id: companionState.step4.id, label: effectiveLabel(companionState.step4) },
        assembled_prompt: companionState.assembledPrompt
      };
      copyToClipboard(companionState.assembledPrompt);
      window.open(CONFIG.agent_url, '_blank', 'noopener');
      submitToGoogleForm('triage', companionState.sessionId, timestamp, payload);
      companionState.committed = true;
      renderBridge();
      showScreen('bridge');
    }

    // ---------- Save reflection ----------
    function saveReflection() {
      const text = document.getElementById('reflect-r-text').value.trim();
      const checks = Array.from(document.querySelectorAll('#reflect-q-list input[type="checkbox"]'))
        .filter(c => c.checked).map(c => c.value);
      const name = document.getElementById('reflect-name').value.trim();
      companionState.reflection = {
        text: text,
        q_responses: checks,
        o_responses: oOrder.slice(),
        optional_name: name || null
      };
      const timestamp = isoNow();
      const payload = {
        type: 'reflection',
        session_id: companionState.sessionId,
        timestamp: timestamp,
        reflection_text: text,
        q_responses: checks,
        o_responses: oOrder.slice(),
        optional_name: name || null
      };
      submitToGoogleForm('reflection', companionState.sessionId, timestamp, payload);
      document.getElementById('reflect-saved').hidden = false;
      document.getElementById('reflect-save').setAttribute('aria-disabled', 'true');
      announce('Reflection saved.');
    }

    // ---------- Restart ----------
    function restart() {
      companionState = freshState();
      oOrder = [];
      document.getElementById('reflect-save').removeAttribute('aria-disabled');
      renderStep1();
      renderStep2();
      renderStep3();
      renderStep4();
      renderReview();
      renderReflection();
      showScreen('step1');
    }

    // ---------- Validation ----------
    function validateStep1() {
      if (!companionState.step1.id) return false;
      if (companionState.step1.isOther) {
        companionState.step1.otherText = document.getElementById('step1-other-text').value.trim();
        if (!companionState.step1.otherText) {
          document.getElementById('step1-other-text').focus();
          return false;
        }
      }
      return true;
    }
    function validateStep2() {
      if (!companionState.step2.id) return false;
      if (companionState.step2.isOther) {
        companionState.step2.otherText = document.getElementById('step2-other-text').value.trim();
        if (!companionState.step2.otherText) {
          document.getElementById('step2-other-text').focus();
          return false;
        }
      }
      return true;
    }
    function validateStep4() {
      if (!companionState.step4.id) return false;
      if (companionState.step4.isOther) {
        companionState.step4.otherText = document.getElementById('step4-other-text').value.trim();
        if (!companionState.step4.otherText) {
          document.getElementById('step4-other-text').focus();
          return false;
        }
      }
      return true;
    }

    // ---------- Wiring ----------
    function wire() {
      document.getElementById('step1-next').addEventListener('click', () => {
        if (validateStep1()) { renderStep2(); showScreen('step2'); }
      });
      document.getElementById('step2-next').addEventListener('click', () => {
        if (validateStep2()) { renderStep3(); showScreen('step3'); }
      });
      document.getElementById('step3-next').addEventListener('click', () => {
        if (captureStep3()) { renderStep4(); showScreen('step4'); }
      });
      document.getElementById('step4-next').addEventListener('click', () => {
        if (validateStep4()) { renderReview(); showScreen('review'); }
      });
      document.querySelectorAll('[data-back]').forEach(b => {
        b.addEventListener('click', () => showScreen(b.dataset.back));
      });
      document.getElementById('review-commit').addEventListener('click', commitReview);

      document.getElementById('bridge-copy-again').addEventListener('click', (e) => {
        copyToClipboard(companionState.assembledPrompt);
        flashCopy(e.currentTarget);
      });
      document.getElementById('bridge-return').addEventListener('click', () => {
        renderReflection();
        showScreen('reflection');
      });

      document.getElementById('reflect-r-text').addEventListener('input', updateWordCount);
      document.getElementById('reflect-save').addEventListener('click', saveReflection);
      document.getElementById('reflect-try-x').addEventListener('click', () => {
        renderX();
        showScreen('x');
      });
      document.getElementById('reflect-restart').addEventListener('click', restart);

      document.getElementById('x-copy-prefix').addEventListener('click', (e) => {
        copyToClipboard('### X\n');
        flashCopy(e.currentTarget);
      });
      document.getElementById('x-done').addEventListener('click', restart);
    }

    function init(cfg) {
      CONFIG = cfg;
      companionState = freshState();
      renderStep1();
      renderStep2();
      renderStep3();
      renderStep4();
      renderReview();
      renderReflection();
      renderX();
      wire();
      showScreen('step1');
    }

    fetch('config.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('config.json HTTP ' + r.status);
        return r.json();
      })
      .then(init)
      .catch(err => {
        console.error('[companion] failed to load config', err);
        const loader = document.getElementById('screen-loading');
        loader.innerHTML =
          '<h2>The Companion could not load</h2>' +
          '<p class="screen-subhead">Configuration failed to load. If you are viewing this directly from disk, serve the directory through a local web server so config.json can be fetched.</p>';
      });
  })();
  </script>
</body>
</html>
